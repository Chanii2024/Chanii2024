<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .stair { stroke: #30363d; stroke-width: 2; fill: none; }
    .goal-text { font-family: 'Segoe UI', Arial; font-size: 12px; fill: #8b949e; }
    .highlight { fill: #2ea44f; font-weight: bold; }
    
    /* The Climbing Animation */
    #dev { fill: #2ea44f; }
    @keyframes climb {
      0%, 20%   { transform: translate(0, 0); }      /* Step 1 */
      25%, 45%  { transform: translate(60px, -30px); }  /* Step 2 */
      50%, 70%  { transform: translate(120px, -60px); } /* Step 3 */
      75%, 95%  { transform: translate(180px, -90px); } /* Step 4 */
      100%      { transform: translate(180px, -90px); }
    }
    #dev { animation: climb 8s infinite ease-in-out; }
  </style>

  <path class="stair" d="M 20 180 H 80 V 150 H 140 V 120 H 200 V 90 H 260 V 60" />

  <text x="90" y="145" class="goal-text highlight">BSc Third Year</text>
  <text x="150" y="115" class="goal-text">Full-Stack Excellence</text>
  <text x="210" y="85" class="goal-text">System Scaling</text>
  <text x="270" y="55" class="goal-text">Architect Mastery</text>

  <rect id="dev" x="40" y="170" width="10" height="10" rx="2" />
</svg>
